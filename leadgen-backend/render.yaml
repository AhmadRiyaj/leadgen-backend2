services:
  - type: web
    name: leadgen-api
    runtime: php
    buildCommand: composer install --no-dev && php artisan config:cache && php artisan migrate --force
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: leadgen-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: leadgen-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: leadgen-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: leadgen-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: leadgen-db
          property: password
      - key: QUEUE_CONNECTION
        value: sync
      - key: SCRAPER_API_KEY
        value: leadgen-secret-2024
      - key: OPENAI_API_KEY
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        value: my_whatsapp_verify_token

databases:
  - name: leadgen-db
    databaseName: leadgen
    user: leadgen
